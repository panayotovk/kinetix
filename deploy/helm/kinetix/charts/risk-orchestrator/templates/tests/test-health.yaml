apiVersion: v1
kind: Pod
metadata:
  name: {{ include "risk-orchestrator.fullname" . }}-test-health
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test-health
      image: busybox
      command: ["wget", "-qO-", "http://{{ include "risk-orchestrator.fullname" . }}:{{ .Values.service.port }}/health"]
